<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Order from Radhe Rasoi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fffaf3;--panel:#ffffff;--panel2:#f6efe5;
  --text:#1e1b16;--muted:#756c5f;--border:rgba(60,38,18,.14);
  --green:#16845e;--green2:#0d6a4a;--accent:#d85b28;
  --red:#b72f2f;--shadow:0 18px 50px rgba(78,47,21,.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.shell{max-width:760px;margin:0 auto;padding:20px 16px 40px;}
.hero{padding:18px 0 16px;}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
h1{font-size:34px;line-height:1.05;letter-spacing:0;font-weight:850;max-width:560px;}
.sub{font-size:15px;line-height:1.5;color:var(--muted);margin-top:10px;max-width:560px;}
.status{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:999px;padding:8px 12px;font-size:13px;color:var(--muted);margin-top:16px;}
.dot{width:8px;height:8px;border-radius:50%;background:#b6aa9b;}
.dot.ok{background:var(--green);}
.dot.err{background:var(--red);}
.dot.loading{background:#d89824;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow);}
.label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:14px 0 7px;}
.label:first-child{margin-top:0;}
input{width:100%;border:1px solid var(--border);background:var(--panel2);border-radius:8px;padding:12px 13px;font:inherit;font-size:16px;color:var(--text);outline:none;}
input:focus{border-color:var(--accent);background:#fff;}
.menu{display:grid;gap:8px;}
.item{border:1px solid var(--border);background:var(--panel2);border-radius:8px;padding:12px;color:var(--text);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;}
.item strong{display:block;font-size:14px;margin-bottom:2px;}
.item span{font-size:12px;color:var(--muted);}
.item .item-description{display:block;font-size:12px;line-height:1.4;margin-top:4px;color:var(--muted);}
.qty{display:flex;align-items:center;gap:8px;}
.qty button{width:32px;height:32px;border:1px solid var(--border);background:#fff;border-radius:8px;font-size:18px;font-weight:800;color:var(--text);cursor:pointer;}
.qty button:active{background:var(--panel2);}
.qty-num{min-width:20px;text-align:center;font-weight:800;}
.actions{display:flex;gap:10px;margin-top:16px;}
button{font:inherit;}
.submit{flex:1;border:none;background:var(--green);color:white;border-radius:8px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer;}
.submit:active{background:var(--green2);}
.submit[disabled]{opacity:.6;cursor:wait;}
.ghost{border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:8px;padding:12px 14px;font-weight:700;cursor:pointer;}
.total{display:flex;justify-content:space-between;align-items:center;background:#f1f8f4;border:1px solid rgba(22,132,94,.2);border-radius:8px;padding:12px 13px;margin-top:12px;}
.total span{color:var(--muted);font-size:13px;font-weight:700;}
.total strong{color:var(--green);font-size:22px;}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:10;}
.toast.show{opacity:1;}
.break-card{display:none;background:#fff3e8;border:1px solid rgba(216,91,40,.22);border-radius:8px;padding:14px;margin-bottom:14px;color:#70410e;}
.break-card strong{display:block;font-size:16px;margin-bottom:3px;color:#4a2b08;}
.confirmation{display:none;margin-top:14px;background:#f1f8f4;border:1px solid rgba(22,132,94,.22);border-radius:8px;padding:14px;}
.confirmation h2{font-size:18px;margin-bottom:8px;color:var(--green);}
.confirm-row{display:flex;justify-content:space-between;gap:12px;border-top:1px solid rgba(22,132,94,.16);padding-top:8px;margin-top:8px;font-size:14px;}
.confirm-row span:first-child{color:var(--muted);font-weight:700;}
.confirm-row span:last-child{text-align:right;font-weight:700;}
.confirm-items{font-size:15px;line-height:1.45;margin-top:4px;}
@media(max-width:680px){
  .shell{padding:16px 12px 34px;}
  h1{font-size:30px;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <div class="eyebrow">Radhe Rasoi</div>
    <h1>Place your order</h1>
    <p class="sub">Send your order straight to Radhe Rasoi. You will see a confirmation here once it is received.</p>
    <div class="status"><span class="dot loading" id="dot"></span><span id="status">Ready to order</span></div>
  </section>

  <section class="grid">
    <aside class="card">
      <span class="label">Select items</span>
      <div class="menu" id="menu"></div>
    </aside>

    <form class="card" id="order-form">
      <div class="break-card" id="break-card">
        <strong>Radhe Rasoi is currently taking a break.</strong>
        <span>Please check again later for fresh orders.</span>
      </div>
      <label class="label" for="name">Your name</label>
      <input id="name" autocomplete="name" placeholder="Customer name" required/>

      <label class="label" for="phone">Phone number</label>
      <input id="phone" autocomplete="tel" inputmode="tel" placeholder="Phone number" required/>

      <label class="label" for="flat">Flat number</label>
      <input id="flat" placeholder="Flat / house number" required/>

      <input id="items" type="hidden"/>

      <label class="label" for="note">Special note</label>
      <input id="note" placeholder="Less spicy, no onion, delivery note..."/>

      <div class="total"><span>Estimated total</span><strong id="total">Rs 0</strong></div>
      <input id="price" type="hidden"/>

      <div class="actions">
        <button class="submit" id="submit" type="submit">Send order</button>
        <button class="ghost" type="button" onclick="clearOrder()">Clear</button>
      </div>
      <div class="confirmation" id="confirmation"></div>
    </form>
  </section>
</main>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://kczqkduzkywvihfifjna.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjenFrZHV6a3l3dmloZmlmam5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjQzMzAsImV4cCI6MjA5MzMwMDMzMH0.R1H6gmUXskxBuQ1s_YUlrRIsgNHPkGe_vD_2LBv5_WU';
const HEADERS = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

const FALLBACK_MENU = [
  {name:'Rajma Rice', price:120, description:'Rajma served with steamed rice.'},
  {name:'Roti', price:15, description:'Fresh homemade roti.'},
  {name:'Paneer Bowl', price:160, description:'Paneer curry served as a filling bowl.'},
  {name:'Veg Thali', price:180, description:'A complete vegetarian meal.'},
  {name:'Dal Rice', price:110, description:'Homestyle dal served with steamed rice.'},
  {name:'Sweet Lassi', price:60, description:'Chilled sweet yogurt drink.'}
];

let menuItems = [...FALLBACK_MENU];
let kitchenOpen = true;
const cart = new Map();

function today(){return new Date().toISOString().slice(0,10);}
function money(v){return 'Rs '+Math.round(parseFloat(v||0));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(state,msg){
  document.getElementById('dot').className='dot '+state;
  document.getElementById('status').textContent=msg;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function renderMenu(){
  document.getElementById('menu').innerHTML=menuItems.map((item,i)=>`
    <div class="item">
      <div>
        <strong>${esc(item.name)}</strong>
        <span>${money(item.price)}</span>
        ${item.description?`<span class="item-description">${esc(item.description)}</span>`:''}
      </div>
      <div class="qty">
        <button type="button" onclick="changeQty(${i},-1)">-</button>
        <span class="qty-num" id="qty-${i}">${cart.get(item.name)?.qty||0}</span>
        <button type="button" onclick="changeQty(${i},1)">+</button>
      </div>
    </div>
  `).join('');
}
function changeQty(index,delta){
  const item=menuItems[index];
  const nextQty=Math.max(0,(cart.get(item.name)?.qty||0)+delta);
  if(nextQty===0)cart.delete(item.name);
  else cart.set(item.name,{...item,qty:nextQty});
  syncItemsFromCart();
  const qty=document.getElementById('qty-'+index);
  if(qty)qty.textContent=nextQty;
}
function syncItemsFromCart(){
  const lines=[...cart.values()].map(item=>`${item.qty}x ${item.name}`);
  const total=[...cart.values()].reduce((sum,item)=>sum+(item.qty*item.price),0);
  document.getElementById('items').value=lines.join(', ');
  document.getElementById('price').value=total || '';
  document.getElementById('total').textContent=money(total);
}
function clearOrder(){
  cart.clear();
  document.getElementById('order-form').reset();
  document.getElementById('price').value='';
  document.getElementById('total').textContent=money(0);
  document.getElementById('confirmation').style.display='none';
  renderMenu();
  setStatus('loading','Ready to order');
}
function showConfirmation(order){
  const box=document.getElementById('confirmation');
  box.innerHTML=`
    <h2>Your order is placed</h2>
    <p style="color:var(--muted);font-size:14px;line-height:1.45;">Thank you, ${esc(order.name)}. Radhe Rasoi has received your order.</p>
    <div class="confirm-row"><span>Items</span><span class="confirm-items">${esc(order.items)}</span></div>
    ${order.note?`<div class="confirm-row"><span>Note</span><span>${esc(order.note)}</span></div>`:''}
    <div class="confirm-row"><span>Phone</span><span>${esc(order.phone)}</span></div>
    <div class="confirm-row"><span>Total</span><span>${order.price?money(order.price):'To be confirmed'}</span></div>
    <div class="confirm-row"><span>Placed at</span><span>${esc(order.time)}</span></div>
  `;
  box.style.display='block';
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function setOrderingEnabled(enabled){
  kitchenOpen=enabled;
  document.getElementById('break-card').style.display=enabled?'none':'block';
  document.querySelectorAll('#order-form input,#order-form button').forEach(el=>{
    if(el.id!=='submit')el.disabled=!enabled;
  });
  document.getElementById('submit').disabled=!enabled;
  document.querySelectorAll('.qty button').forEach(btn=>btn.disabled=!enabled);
}
async function submitOrder(event){
  event.preventDefault();
  if(!kitchenOpen){
    toast('Radhe Rasoi is taking a break.');
    return;
  }
  const button=document.getElementById('submit');
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const flat=document.getElementById('flat').value.trim();
  const items=document.getElementById('items').value.trim();
  const note=document.getElementById('note').value.trim();
  const price=document.getElementById('price').value.trim();
  if(!name||!phone||!flat){toast('Please add name, phone, and flat number.');return;}
  if(!items){toast('Please select at least one item.');return;}
  const contact=`${phone} / Flat ${flat}`;
  const order={
    id:Date.now(),
    name,
    phone: contact,
    items,
    price,
    note,
    status:'new',
    time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
    date:today()
  };
  button.disabled=true;
  setStatus('loading','Sending order...');
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/orders`,{method:'POST',headers:HEADERS,body:JSON.stringify(order)});
    if(!r.ok)throw new Error(await r.text());
    clearOrder();
    showConfirmation(order);
    setStatus('ok','Order sent to kitchen');
    toast('Order received');
  }catch(err){
    setStatus('err','Could not send order');
    toast('Connection error. Please try again.');
  }finally{
    button.disabled=false;
  }
}
async function loadMenu(){
  setStatus('loading','Loading menu...');
  try{
    const [menuResponse,settingsResponse]=await Promise.all([
      fetch(`${SUPA_URL}/rest/v1/menu_items?order=id.asc`,{headers:HEADERS}),
      fetch(`${SUPA_URL}/rest/v1/settings?id=eq.kitchen_open`,{headers:HEADERS})
    ]);
    if(!menuResponse.ok)throw new Error(await menuResponse.text());
    const rows=await menuResponse.json();
    if(rows.length)menuItems=rows.map(item=>({name:item.name,price:parseFloat(item.price||0),description:item.description||''}));
    if(settingsResponse.ok){
      const settings=await settingsResponse.json();
      kitchenOpen=settings.length?String(settings[0].value)==='true':true;
    }
    setStatus(kitchenOpen?'ok':'err',kitchenOpen?'Ready to order':'Radhe Rasoi is taking a break');
  }catch(err){
    setStatus('err','Using sample menu');
  }
  renderMenu();
  setOrderingEnabled(kitchenOpen);
}
loadMenu();
document.getElementById('order-form').addEventListener('submit',submitOrder);
</script>
</body>
</html>
